<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Voice Analytics Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="login-body">

  <!-- Animated grid background -->
  <div class="grid-bg"></div>
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" stroke="#10b981" stroke-width="2"/>
            <path d="M10 28 L15 18 L20 22 L25 12 L30 20" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="20" cy="20" r="3" fill="#10b981"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">VoiceAnalytics</span>
          <span class="brand-sub">eCommerce Intelligence</span>
        </div>
      </div>

      <h1 class="login-title">Sign in to Dashboard</h1>
      <p class="login-desc">Access your analytics command centre</p>

      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <div id="loginError" class="alert alert-error hidden"></div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text"  id="username" name="username" placeholder="admin / analyst / demo" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" name="password" placeholder="Enter password" required />
            <button type="button" class="pw-toggle" onclick="togglePw()" tabindex="-1">👁</button>
          </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-label">Sign In</span>
          <span class="btn-spinner hidden">⟳</span>
        </button>
      </form>

      <div class="demo-creds">
        <p class="demo-title">Demo Credentials</p>
        <div class="cred-list">
          <button class="cred-chip" onclick="fillCreds('admin','admin123')">admin / admin123</button>
          <button class="cred-chip" onclick="fillCreds('analyst','analyst123')">analyst / analyst123</button>
          <button class="cred-chip" onclick="fillCreds('demo','demo')">demo / demo</button>
        </div>
      </div>

    </div>

    <p class="footer-note">AWS Cloud Architecture Project &mdash; Voice-Driven eCommerce Analytics</p>
  </div>

  <script>
    const form     = document.getElementById("loginForm");
    const errDiv   = document.getElementById("loginError");
    const loginBtn = document.getElementById("loginBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errDiv.classList.add("hidden");
      loginBtn.querySelector(".btn-label").classList.add("hidden");
      loginBtn.querySelector(".btn-spinner").classList.remove("hidden");
      loginBtn.disabled = true;

      const body = {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
      };

      try {
        const res  = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = data.redirect;
        } else {
          showError(data.message || "Invalid credentials");
        }
      } catch (err) {
        showError("Connection error. Please try again.");
      } finally {
        loginBtn.querySelector(".btn-label").classList.remove("hidden");
        loginBtn.querySelector(".btn-spinner").classList.add("hidden");
        loginBtn.disabled = false;
      }
    });

    function showError(msg) {
      errDiv.textContent = msg;
      errDiv.classList.remove("hidden");
    }

    function fillCreds(u, p) {
      document.getElementById("username").value = u;
      document.getElementById("password").value = p;
    }

    function togglePw() {
      const inp = document.getElementById("password");
      inp.type  = inp.type === "password" ? "text" : "password";
    }
  </script>
</body>
</html>
